<html>
<head>
    <title>Dinosaur Game</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- This is the font returned from Google font -->
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Style to make the svg fit in the browser */
        body { padding: 0; margin: 0; }
        svg  { width: 100%; height: auto; }

        /* The container moves the text to the middle of the screen */
        #gameover-container {
            transform: translate(500px,200px);
            display: none;
        }
        #gameover {
            font-family: Dosis, sans-serif;
            opacity: 0;
        }
        #gameover.animate {
            animation: gameover-entrance 1s ease-out forwards;
        }
        @keyframes gameover-entrance {
            0%   { opacity: 0; transform: scale(3) rotate(-15deg); }
            40%  { opacity: 1; transform: scale(0.8) rotate(5deg); }
            60%  { transform: scale(1.1) rotate(-3deg); }
            80%  { transform: scale(0.95) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* Object animation - drift from right to left */
        @keyframes object-animation {
            from { transform: translateX(0px); }
            to   { transform: translateX(-1100px); }
        }
        .cloud {
            animation-name: object-animation;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-duration: 3s;
        }
        #obstacle {
            animation-name: none;
            animation-timing-function: linear;
            animation-iteration-count: 1;
            animation-duration: 3s;
            animation-delay: -0.1s;
            display: none;
        }
        #dinosaur {
            animation-name: none;
            animation-timing-function: linear;
            animation-iteration-count: 1;
            animation-duration: 0.7s;
        }

        @keyframes dinosaur-animation {
            0%   { transform: translate(70px, 230.0px) scale(0.236) translate(-30px, -25px); }
            5%   { transform: translate(70px, 186.3px) scale(0.236) translate(-30px, -25px); }
            10%  { transform: translate(70px, 147.2px) scale(0.236) translate(-30px, -25px); }
            15%  { transform: translate(70px, 112.7px) scale(0.236) translate(-30px, -25px); }

            30%  { transform: translate(70px, 36.8px)  scale(0.236) translate(-30px, -25px); }
            35%  { transform: translate(70px, 20.7px)  scale(0.236) translate(-30px, -25px); }

    <script>
    // Check whether the game is over if the dinosaur is near the obstacle

    var speed = 1; // playback rate multiplier (1 = normal)

    function checkGameover() {
        // You need to keep on checking for the gameover situation here
        // Get the bounding boxes of the dinosaur and obstacle
        var dino = document.getElementById("dinosaur");
        var obstacle = document.getElementById("obstacle");
        var dinoRect = dino.getBoundingClientRect();
        var obstacleRect = obstacle.getBoundingClientRect();

        // Check if the obstacle is visible (has width/height)
        var obstacleVisible = obstacleRect.width > 0 && obstacleRect.height > 0;

        // Check for overlap between the two bounding boxes
        var overlap = !(dinoRect.right < obstacleRect.left ||
                        dinoRect.left > obstacleRect.right ||
                        dinoRect.bottom < obstacleRect.top ||
                        dinoRect.top > obstacleRect.bottom);

        // Game over if the obstacle is visible and overlapping the dinosaur
        if (obstacleVisible && overlap) {
            console.log("Game Over");
            // Show the game over text
            $("#gameover-container").css("display", "inline");
            $("#gameover").addClass("animate");
            
            // Stop all animations
            $(".cloud").css("animation-play-state", "paused");
            $("#obstacle").css("animation-play-state", "paused");
            $("#dinosaur").css("animation-play-state", "paused");
            return;
        }

        // Request to check again
        setTimeout(checkGameover, 50);
    }

    // Make an obstacle by starting the obstacle animation
    function makeObstacle() {
        // You need to show the obstacle and start the animation here
        $("#obstacle").css("display", "inline");
        $("#obstacle").css("animation-name", "object-animation");
    }

    // Make the dinosaur jump by starting the dinosaur animation
    function jump() {
        // You need to start the dinosaur jumping animation here
        $("#dinosaur").css("animation-name", "dinosaur-animation");

    }

    $(function () {
        // Handle the spacebar key for controlling the dinosaur
        $(document).on("keydown", function(e) {
            // The dinosaur jumps if the spacebar key is down
            if (e.keyCode == 32)
                jump();
        });

        // The obstacle animation has finished
        $("#obstacle").on("animationend", function() {

            // You need to hide the obstacle and stop the animation here
            $("#obstacle").css("display", "none");
            $("#obstacle").css("animation-name", "none");

            // Speed up for the next obstacle
            speed += 0.15;
            $("#obstacle").css("animation-duration", (3 / speed) + "s");

            // Smoothly speed up all clouds using playbackRate
            document.querySelectorAll(".cloud").forEach(function(cloud) {
                cloud.getAnimations().forEach(function(anim) {
                    anim.playbackRate = speed;
                });
            });

            // You will make another obstacle later
            setTimeout(makeObstacle, Math.random() * 2000);
        });

        // The dinosaur animation has finished
        $("#dinosaur").on("animationend", function() {

            // You need to stop the animation here
            $("#dinosaur").css("animation-name", "none");

        });

        // Start the obstacle animation
        setTimeout(makeObstacle, Math.random() * 2000);

        // Start the game over checking
        setTimeout(checkGameover, 50);
    });
    </script>
